<header class="mc-header">

    <div class="mc-header__left">
        <button class="mc-header__menu-btn d-lg-none" type="button" aria-label="Open menu">

            <i class="bi bi-list"></i>
        </button>

        <div>
            <nav aria-label="breadcrumb" class="mc-header__crumb">
                <span>MedCore HMS</span>
                <i class="bi bi-chevron-right"></i>
                <span class="mc-header__crumb-current">
                    {{ pageTitle }}
                </span>
            </nav>

            <h1 class="mc-header__title">
                {{ pageTitle }}
            </h1>
        </div>
    </div>

    <div class="mc-header__search">
        <i class="bi bi-search"></i>

        <input type="search" placeholder="Search patients, doctors, records…" aria-label="Search">

        <kbd>⌘K</kbd>
    </div>

    <div class="mc-header__right">

        <button class="mc-header__icon-btn" type="button" aria-label="Messages">

            <i class="bi bi-chat-dots"></i>

            <span class="mc-header__dot" *ngIf="messagesCount > 0">
                {{ messagesCount }}
            </span>

        </button>

        <button class="mc-header__icon-btn" type="button" aria-label="Notifications">

            <i class="bi bi-bell"></i>

            <span class="mc-header__dot mc-header__dot--alert" *ngIf="notificationsCount > 0">

                {{ notificationsCount }}

            </span>

        </button>

        <div class="mc-header__divider"></div>

        <div class="mc-header__profile">

            <button class="mc-header__profile-btn" type="button" (click)="toggleProfileMenu()">

                <span class="mc-header__avatar">
                    {{ currentUser.avatarInitials }}
                </span>

                <span class="mc-header__profile-text d-none d-md-flex">
                    <strong>{{ currentUser.name }}</strong>
                    <small>{{ currentUser.role }}</small>
                </span>

                <i class="bi bi-chevron-down mc-header__chev"></i>

            </button>

            <div class="mc-header__profile-menu" *ngIf="isProfileMenuOpen">

                <a routerLink="/profile">
                    <i class="bi bi-person"></i>
                    My Profile
                </a>

                <a routerLink="/settings">
                    <i class="bi bi-gear"></i>
                    Account Settings
                </a>

                <hr>

                <a routerLink="/logout" class="mc-header__logout">

                    <i class="bi bi-box-arrow-right"></i>
                    Sign Out

                </a>

            </div>

        </div>

    </div>

</header>
