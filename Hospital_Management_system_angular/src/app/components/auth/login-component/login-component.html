<form (ngSubmit)="login()">

    <div class="mb-3">

        <label>Email</label>

        <input type="email" class="form-control" [(ngModel)]="loginData.email" name="email">

    </div>

    <div class="mb-3">

        <label>Password</label>

        <input type="password" class="form-control" [(ngModel)]="loginData.password" name="password">

    </div>

    <button class="btn btn-primary">
        Login
    </button>

</form>
