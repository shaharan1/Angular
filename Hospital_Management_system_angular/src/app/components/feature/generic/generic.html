<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header bg-primary text-white">
      <h4>Add Generic</h4>
    </div>

    <div class="card-body">

      <div class="mb-3">

        <label class="form-label">Generic Name</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="generic.genericName"
          name="genericName">

      </div>

      <button
        class="btn btn-success"
        (click)="save()">

        Save Generic

      </button>

    </div>

  </div>

</div>
