<div class="container-fluid mt-4">

  <div class="card shadow">

    <!-- Header -->
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

      <h4 class="mb-0">Patient List</h4>

      <button class="btn btn-light" routerLink="/patient">
        <i class="bi bi-plus-circle"></i> Add Patient
      </button>

    </div>

    <div class="card-body">

      <!-- Search & Filter -->
      <div class="row mb-4">

        <!-- Search Name -->
        <div class="col-md-3 mb-2">
          <input type="text" class="form-control" placeholder="Search by Name" [(ngModel)]="searchText"
            (keyup)="filterPatients()">
        </div>

        <!-- Patient Code -->
        <div class="col-md-3 mb-2">
          <input type="text" class="form-control" placeholder="Patient Code" [(ngModel)]="patientCode"
            (keyup)="filterPatients()">
        </div>

        <!-- Phone -->
        <div class="col-md-3 mb-2">
          <input type="text" class="form-control" placeholder="Search by Phone" [(ngModel)]="phone"
            (keyup)="filterPatients()">
        </div>

        <!-- Clear -->
        <div class="col-md-3 mb-2">
          <button class="btn btn-secondary w-100" (click)="clearFilters()">

            Clear Filter

          </button>
        </div>

      </div>

      <!-- Patient Table -->
      <div class="table-responsive">

        <table class="table table-bordered table-hover table-striped align-middle">

          <thead class="table-dark">

            <tr>

              <th>#</th>
              <th>Patient Code</th>
              <th>Name</th>
              <th>Gender</th>
              <th>DOB</th>
              <th>Blood</th>
              <th>Phone</th>
              <th>Email</th>
              <th>City</th>
              <th width="220">Action</th>

            </tr>

          </thead>

          <tbody>

            <tr *ngFor="let patient of filteredPatients; let i = index">

              <td>{{ i + 1 }}</td>

              <td>{{ patient.patientCode }}</td>

              <td>{{ patient.name }}</td>

              <td>{{ patient.gender }}</td>

              <td>{{ patient.dateOfBirth }}</td>

              <td>{{ patient.bloodGroup }}</td>

              <td>{{ patient.phone }}</td>

              <td>{{ patient.email }}</td>

              <td>{{ patient.city }}</td>

              <td>

                <button class="btn btn-info btn-sm me-1" (click)="view(patient.id!)">

                  View

                </button>

                <button class="btn btn-warning btn-sm me-1" (click)="edit(patient.id!)">

                  Edit

                </button>

                <button class="btn btn-danger btn-sm" (click)="delete(patient.id!)">

                  Delete

                </button>

              </td>

            </tr>

            <tr *ngIf="filteredPatients.length === 0">

              <td colspan="10" class="text-center text-danger">

                No Patient Found

              </td>

            </tr>

          </tbody>

        </table>

      </div>

    </div>

  </div>

</div>
