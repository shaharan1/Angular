<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Book Appointment</h3>

        </div>

        <div class="card-body">

            <form [formGroup]="appointmentForm" (ngSubmit)="save()">

                <div class="row">

                    <!-- Patient Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Patient Name</label>
                        <input
                            type="text"
                            class="form-control"
                            formControlName="patientName">
                    </div>

                    <!-- Mobile -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input
                            type="text"
                            class="form-control"
                            formControlName="mobileNumber"
                            (blur)="checkReturningPatient()">
                    </div>

                    <!-- Returning Patient -->
                    <div class="col-md-12 mb-3">

                        <div
                            *ngIf="returningPatient"
                            class="alert alert-success">

                            Returning Patient

                        </div>

                        <div
                            *ngIf="!returningPatient"
                            class="alert alert-warning">

                            New Patient

                        </div>

                    </div>

                    <!-- Specialization -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Specialization</label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="specialization">
                    </div>

                    <!-- Doctor -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">Doctor</label>

                        <select
                            class="form-select"
                            formControlName="doctorId"
                            (change)="calculateFee()">

                            <option value="">Select Doctor</option>

                            <option
                                *ngFor="let doctor of doctors"
                                [value]="doctor.id">

                                {{doctor.name}}

                            </option>

                        </select>

                    </div>

                    <!-- Appointment Date -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Appointment Date</label>

                        <input
                            type="date"
                            class="form-control"
                            formControlName="appointmentDate">
                    </div>

                    <!-- Appointment Time -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Appointment Time</label>

                        <input
                            type="time"
                            class="form-control"
                            formControlName="appointmentTime">
                    </div>

                    <!-- Problem -->
                    <div class="col-md-12 mb-3">

                        <label class="form-label">
                            Problem Description
                        </label>

                        <textarea
                            rows="4"
                            class="form-control"
                            formControlName="problemDescription">
                        </textarea>

                    </div>

                    <!-- Payment -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Payment Method

                        </label>

                        <select
                            class="form-select"
                            formControlName="paymentMethod">

                            <option value="">Select</option>

                            <option value="Cash">
                                Cash
                            </option>

                            <option value="Bkash">
                                bKash
                            </option>

                            <option value="Nagad">
                                Nagad
                            </option>

                            <option value="Bank">
                                Bank
                            </option>

                        </select>

                    </div>

                    <!-- Transaction -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Transaction ID

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            formControlName="transactionId">

                    </div>

                    <!-- Fee -->

                    <div class="col-md-12 mb-3">

                        <div class="alert alert-info">

                            <h5>

                                Consultation Fee :
                                <strong>{{fee}} Tk</strong>

                            </h5>

                        </div>

                    </div>

                </div>

                <button
                    class="btn btn-success">

                    Book Appointment

                </button>

                <button
                    type="reset"
                    class="btn btn-secondary ms-2">

                    Reset

                </button>

            </form>

        </div>

    </div>

</div>
