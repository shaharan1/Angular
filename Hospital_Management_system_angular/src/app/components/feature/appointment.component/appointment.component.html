<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Book Appointment</h3>

        </div>

        <div class="card-body">

            <form [formGroup]="appointmentForm" (ngSubmit)="save()">

                <div class="row">

                    <!-- Patient Name -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Patient Name</label>
                        <input type="text" class="form-control" formControlName="patientName">
                    </div>

                    <!-- Mobile -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="text" class="form-control" formControlName="mobileNumber"
                            (blur)="checkReturningPatient()">
                    </div>

                    <!-- Returning Patient -->
                    <div class="col-md-12 mb-3">

                        <div *ngIf="returningPatient" class="alert alert-success">

                            Returning Patient

                        </div>

                        <div *ngIf="!returningPatient" class="alert alert-warning">

                            New Patient

                        </div>

                    </div>

                    <!-- Specialization -->
                    <!-- Doctor Department -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Doctor Department</label>

                        <select class="form-select" formControlName="doctorDepartmentId">

                            <option value="">Select Department</option>

                            <option *ngFor="let dept of dosctorsDepartments" [value]="dept.id">
                                {{ dept.departmentName }}
                            </option>

                        </select>
                    </div>

                    <!-- Doctor -->
                    <!-- Doctor -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">Doctor</label>

                        <select class="form-select" formControlName="doctorId" (change)="calculateFee()"
                            [disabled]="!appointmentForm.get('doctorDepartmentId')?.value">

                            <option value="">Select Doctor</option>

                            <option *ngFor="let doctor of doctors" [value]="doctor.id">
                                {{doctor.name}}
                            </option>

                        </select>

                        <div *ngIf="appointmentForm.get('doctorDepartmentId')?.value && doctors.length === 0"
                            class="text-muted mt-1">
                            No doctors found in this department.
                        </div>

                    </div>

                    <!-- Appointment Date -->
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Appointment Date</label>

                        <input type="date" class="form-control" formControlName="appointmentDate">
                    </div>

                    <!-- Appointment Time -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Available Time Slots
                        </label>

                        <select class="form-select" formControlName="appointmentTime"
                            [disabled]="!appointmentForm.get('doctorId')?.value || !appointmentForm.get('appointmentDate')?.value">

                            <option value="">Select Available Time</option>

                            <option *ngFor="let slot of availableSlots" [value]="slot.startTime">

                                {{ slot.startTime }} - {{ slot.endTime }}

                            </option>

                        </select>

                        <div *ngIf="appointmentForm.get('doctorId')?.value
               && appointmentForm.get('appointmentDate')?.value
               && availableSlots.length === 0" class="text-danger mt-2">

                            No available slots for the selected doctor and date.

                        </div>

                    </div>

                    <!-- Problem -->
                    <div class="col-md-12 mb-3">

                        <label class="form-label">
                            Problem Description
                        </label>

                        <textarea rows="4" class="form-control" formControlName="problemDescription">
                        </textarea>

                    </div>

                    <!-- Payment -->
                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Payment Method

                        </label>

                        <select class="form-select" formControlName="paymentMethod">

                            <option value="">Select</option>

                            <option value="Cash">
                                Cash
                            </option>

                            <option value="Bkash">
                                bKash
                            </option>

                            <option value="Nagad">
                                Nagad
                            </option>

                            <option value="Bank">
                                Bank
                            </option>

                        </select>

                    </div>

                    <!-- Transaction -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Transaction ID

                        </label>

                        <input type="text" class="form-control" formControlName="transactionId">

                    </div>

                    <!-- Fee -->

                    <div class="col-md-12 mb-3">

                        <div class="alert alert-info">

                            <h5>

                                Consultation Fee :
                                <strong>{{fee}} Tk</strong>

                            </h5>

                        </div>

                    </div>

                </div>

                <button class="btn btn-success">

                    Book Appointment

                </button>

                <button type="reset" class="btn btn-secondary ms-2">

                    Reset

                </button>

            </form>

        </div>

    </div>

</div>
