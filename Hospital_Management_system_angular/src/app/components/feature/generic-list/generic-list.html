<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header bg-success text-white">
      <h4>Generic List</h4>
    </div>

    <div class="card-body">

      <table class="table table-bordered table-hover">

        <thead>

          <tr>

            <th>#</th>
            <th>Generic Name</th>
            <th width="180">Action</th>

          </tr>

        </thead>

        <tbody>

          <tr *ngFor="let g of generics; let i = index">

            <td>{{ i + 1 }}</td>

            <td>{{ g.genericName }}</td>

            <td>

              <button
                class="btn btn-warning btn-sm me-2"
                (click)="edit(g.id!)">

                Update

              </button>

              <button
                class="btn btn-danger btn-sm"
                (click)="delete(g.id!)">

                Delete

              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
