<div class="container-fluid py-4">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">
                <i class="bi bi-file-earmark-medical"></i>
                Prescription
            </h3>
        </div>

        <div class="card-body">

            <!-- Basic Information -->
            <div class="row g-3">

                <div class="col-md-4">
                    <label class="form-label">Appointment ID</label>
                    <input type="number" class="form-control" [(ngModel)]="prescription.appointmentId">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Doctor ID</label>
                    <input type="number" class="form-control" [(ngModel)]="prescription.doctorId">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Patient ID</label>
                    <input type="number" class="form-control" [(ngModel)]="prescription.patientId">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Diagnosis</label>
                    <textarea rows="3" class="form-control" [(ngModel)]="prescription.diagnosis">
          </textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Chief Complaints</label>
                    <textarea rows="3" class="form-control" [(ngModel)]="prescription.chiefComplaints">
          </textarea>
                </div>

                <div class="col-md-12">
                    <label class="form-label">Symptoms</label>
                    <textarea rows="2" class="form-control" [(ngModel)]="prescription.symptoms">
          </textarea>
                </div>

            </div>

            <hr>

            <!-- Vitals -->

            <h5 class="mb-3">Patient Vitals</h5>

            <div class="row g-3">

                <div class="col-md-3">
                    <label>Blood Pressure</label>
                    <input class="form-control" [(ngModel)]="prescription.bloodPressure">
                </div>

                <div class="col-md-3">
                    <label>Pulse Rate</label>
                    <input class="form-control" [(ngModel)]="prescription.pulseRate">
                </div>

                <div class="col-md-3">
                    <label>Temperature</label>
                    <input class="form-control" [(ngModel)]="prescription.bodyTemperature">
                </div>

                <div class="col-md-3">
                    <label>Weight</label>
                    <input class="form-control" [(ngModel)]="prescription.weight">
                </div>

            </div>

            <hr>

            <!-- Medicines -->

            <div class="d-flex justify-content-between align-items-center mb-3">

                <h4 class="mb-0">
                    Medicines
                </h4>

                <button class="btn btn-primary" (click)="addMedicine()">

                    + Add Medicine

                </button>

            </div>

            <table class="table table-hover table-bordered align-middle">

                <thead class="table-primary">

                    <tr>

                        <th width="30%">Medicine</th>
                        <th width="20%">Dosage</th>
                        <th width="20%">Duration</th>
                        <th width="20%">Instruction</th>
                        <th width="10%">Action</th>

                    </tr>

                </thead>

                <tbody>

                    <tr *ngFor="let item of prescription.prescriptionItems; let i=index">

                        <td class="position-relative">

                            <input class="form-control" [(ngModel)]="item.medicineName"
                                (input)="searchMedicine(item.medicineName || '')" placeholder="Search Medicine">

                            <div class="list-group search-box" *ngIf="filteredMedicines.length">

                                <button type="button" class="list-group-item list-group-item-action"
                                    *ngFor="let medicine of filteredMedicines" (click)="selectMedicine(item, medicine)">

                                    {{medicine.medicineName}}

                                </button>

                            </div>

                        </td>

                        <td>

                            <input class="form-control" [(ngModel)]="item.dosage" placeholder="1+1+1">

                        </td>

                        <td>

                            <input class="form-control" [(ngModel)]="item.duration" placeholder="7 Days">

                        </td>

                        <td>

                            <input class="form-control" [(ngModel)]="item.instruction" placeholder="After Meal">

                        </td>

                        <td class="text-center">

                            <button class="btn btn-danger btn-sm" (click)="removeMedicine(i)">

                                Remove

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

            <hr>

            <!-- Tests -->

            <hr>

            <div class="card shadow-sm mt-4">

                <div class="card-header bg-info text-white">

                    <h5 class="mb-0">
                        Diagnostic Tests
                    </h5>

                </div>

                <div class="card-body">

                    <label class="form-label">
                        Search Test
                    </label>

                    <input class="form-control" [ngModel]="testKeyword" (ngModelChange)="searchTest($event)"
                        placeholder="Type CBC, Blood, X-Ray, MRI...">

                    <!-- Search Result -->

                    <div class="list-group mt-1" *ngIf="filteredTests.length">

                        <button type="button" class="list-group-item list-group-item-action"
                            *ngFor="let t of filteredTests" (click)="selectTest(t)">

                            <div class="d-flex justify-content-between">

                                <div>

                                    <strong>{{t.testName}}</strong>

                                    <br>

                                    <small>{{t.testCode}}</small>

                                </div>

                                <span class="badge bg-primary">

                                    {{t.standardPrice}} Tk

                                </span>

                            </div>

                        </button>

                    </div>

                </div>

            </div>

            <br>

            <div class="card shadow-sm mt-3" *ngIf="selectedTests.length">

                <div class="card-header bg-success text-white">

                    <h5 class="mb-0">Selected Tests</h5>

                </div>

                <div class="card-body">

                    <table class="table table-hover table-bordered">

                        <thead class="table-success">

                            <tr>

                                <th>Code</th>

                                <th>Test Name</th>

                                <th>Price</th>

                                <th width="120">Action</th>

                            </tr>

                        </thead>

                        <tbody>

                            <tr *ngFor="let test of selectedTests">

                                <td>{{test.testCode}}</td>

                                <td>{{test.testName}}</td>

                                <td>{{test.standardPrice}} Tk</td>

                                <td>

                                    <button class="btn btn-danger btn-sm" (click)="removeTest(test)">

                                        Remove

                                    </button>

                                </td>

                            </tr>

                        </tbody>

                        <tfoot>

                            <tr>

                                <th colspan="2" class="text-end">

                                    Total Cost

                                </th>

                                <th>

                                    {{totalTestCost}} Tk

                                </th>

                                <th></th>

                            </tr>

                        </tfoot>

                    </table>

                </div>

            </div>




            <!-- Notes -->

            <div class="row g-3">

                <div class="col-md-8">

                    <label>Notes</label>

                    <textarea rows="4" class="form-control" [(ngModel)]="prescription.notes">
          </textarea>

                </div>

                <div class="col-md-4">

                    <label>Next Follow Up</label>

                    <input type="date" class="form-control" [(ngModel)]="prescription.nextFollowUpDate">

                </div>

            </div>

            <div class="text-end mt-4">

                <button class="btn btn-success btn-lg" (click)="save()">

                    Save Prescription

                </button>

            </div>

        </div>

    </div>

</div>
