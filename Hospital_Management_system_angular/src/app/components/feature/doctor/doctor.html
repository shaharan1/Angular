<div class="card">

    <div class="card-header">

        <h3>

            {{ isEdit ? 'Edit Doctor' : 'Add Doctor' }}

        </h3>

    </div>

    <div class="card-body">

        <form [formGroup]="doctorForm" (ngSubmit)="save()">

            <div class="row">

                <div class="col-md-6">

                    <label>Name</label>

                    <input class="form-control" formControlName="name">

                </div>

                <div class="col-md-6">

                    <label>Email</label>

                    <input class="form-control" formControlName="email">

                </div>

                <div class="col-md-6 mt-3">

                    <label>Phone</label>

                    <input class="form-control" formControlName="phone">

                </div>

                <div class="col-md-6 mt-3">

                    <label>Password</label>

                    <input type="password" class="form-control" formControlName="password">

                </div>

                <div class="col-md-6 mt-3">

                    <label>Department</label>

                    <select class="form-select" formControlName="doctorDepatrmentId">

                        <option value="">Select Department</option>

                        <option *ngFor="let d of departments" [value]="d.id">

                            {{ d.departmentName }}

                        </option>

                    </select>

                </div>

                <div class="col-md-6 mt-3">

                    <label>Specialization</label>

                    <input class="form-control" formControlName="specialization">

                </div>

                <div class="col-md-6 mt-3">

                    <label>Consultation Fee</label>

                    <input type="number" class="form-control" formControlName="consultationFee">

                </div>

                <div class="col-md-6 mt-3">

                    <label>Follow Up Fee</label>

                    <input type="number" class="form-control" formControlName="followUpFee">

                </div>

            </div>

            <button class="btn btn-primary mt-4">

                {{ isEdit ? 'Update Doctor' : 'Save Doctor' }}

            </button>

        </form>

    </div>

</div>
