<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header bg-primary text-white">
      <h4>Add Medicine</h4>
    </div>

    <div class="card-body">

      <div class="row">

        <!-- Medicine Name -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Medicine Name</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="medicine.medicineName"
            name="medicineName">
        </div>

        <!-- Generic Name -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Generic Name</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="medicine.genericName"
            name="genericName">
        </div>

        <!-- Dosage -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Dosage</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="medicine.dosage"
            name="dosage">
        </div>

        <!-- Prescription Id -->
        <div class="col-md-6 mb-3">
          <label class="form-label">Prescription Id</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="medicine.prescriptionId"
            name="prescriptionId">
        </div>

        <!-- Save Button -->
        <div class="col-12 mt-4">
          <button
            class="btn btn-success"
            (click)="save()">
            Save Medicine
          </button>
        </div>

      </div>

    </div>

  </div>

</div>
